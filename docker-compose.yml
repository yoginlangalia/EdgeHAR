version: '3.8'

services:
  # Streamlit real-time monitoring dashboard
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped

  # Model training service (run once)
  trainer:
    build: .
    command: python src/train.py --epochs 50
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
    profiles:
      - training
